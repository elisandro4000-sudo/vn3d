<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>VN Criações - Loja</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial;background:#090909;color:#fff;background:radial-gradient(circle at top,#1d1d1d,#090909 65%)}body:before{content:"";position:fixed;inset:0;z-index:-1;background:repeating-linear-gradient(-12deg,transparent 0 20px,rgba(201,163,75,.05) 21px,transparent 22px),radial-gradient(circle at 20% 20%,rgba(201,163,75,.08),transparent 35%),radial-gradient(circle at 80% 80%,rgba(201,163,75,.08),transparent 35%)}
.wrap{max-width:1200px;margin:auto;padding:30px}.top{text-align:center}.logo{width:180px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;margin-top:30px}.card,.cart{background:rgba(255,255,255,.04);border:1px solid rgba(201,163,75,.25);backdrop-filter:blur(10px);border-radius:20px;padding:18px}.card img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:14px;background:#222}.price{color:#c9a34b;font-weight:bold;margin:10px 0}.btn{width:100%;padding:12px;border:none;border-radius:999px;background:#c9a34b;color:#111;font-weight:bold;cursor:pointer}.cart{position:sticky;bottom:15px;margin-top:30px}
</style></head><body><div class="wrap"><div class="top"><img class="logo" src="logo.png"><h1>Loja VN Criações</h1><p>Impressão 3D</p></div><div id="produtos" class="grid"></div><div class="cart"><h2>Pedido</h2><div id="lista">Nenhum item.</div><h3 id="total">Total: R$ 0,00</h3><button class="btn" onclick="enviar()">Finalizar no WhatsApp</button></div></div>
<script>
const produtos=[
{n:'Suporte para Headset',p:39.9,d:'Mantém seu headset organizado.',i:'https://placehold.co/500x500?text=Headset'},
{n:'Suporte para Controle',p:49.9,d:'Ideal para controles.',i:'https://placehold.co/500x500?text=Controle'},
{n:'Organizador de Cabos',p:24.9,d:'Acabe com a bagunça.',i:'https://placehold.co/500x500?text=Cabos'},
{n:'Vaso Decorativo',p:34.9,d:'Impressão 3D decorativa.',i:'https://placehold.co/500x500?text=Vaso'}];
let carrinho=[];
const div=document.getElementById('produtos');
produtos.forEach((x,i)=>div.innerHTML+=`<div class=card><img src="${x.i}"><h3>${x.n}</h3><p>${x.d}</p><div class=price>R$ ${x.p.toFixed(2).replace('.',',')}</div><button class=btn onclick="add(${i})">Adicionar ao pedido</button></div>`);
function add(i){let it=carrinho.find(a=>a.i==i);if(it)it.q++;else carrinho.push({i,q:1});render();}
function render(){let l=document.getElementById('lista'),t=0;if(!carrinho.length){l.innerHTML='Nenhum item.';document.getElementById('total').innerHTML='Total: R$ 0,00';return;}l.innerHTML='';carrinho.forEach(c=>{let p=produtos[c.i];t+=p.p*c.q;l.innerHTML+=`<div>${p.n} x${c.q} — R$ ${(p.p*c.q).toFixed(2).replace('.',',')}</div>`});document.getElementById('total').innerHTML='Total: R$ '+t.toFixed(2).replace('.',',')}
function enviar(){if(!carrinho.length){alert('Adicione produtos.');return;}let total=0,msg='Olá! Gostaria de fazer um pedido.%0A%0A';carrinho.forEach(c=>{let p=produtos[c.i],s=p.p*c.q;total+=s;msg+=`• ${p.n}%0AQuantidade: ${c.q}%0AValor: R$ ${s.toFixed(2).replace('.',',')}%0A%0A`;});msg+='Total: R$ '+total.toFixed(2).replace('.',',');window.open('https://wa.me/5546920021343?text='+msg,'_blank')}
</script></body></html>
