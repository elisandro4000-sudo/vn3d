<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VN Criações</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    min-height:100%;
    font-family:Arial,sans-serif;
    background:#090909;
    color:#fff;
}

body{
    overflow-x:hidden;
    overflow-y:auto;

    background:
    radial-gradient(circle at top,#1d1d1d,#090909 65%);
}

body:before{

    content:"";
    position:fixed;
    inset:0;
    z-index:-1;

    background:

    repeating-linear-gradient(
    -12deg,
    transparent 0 20px,
    rgba(201,163,75,.05) 21px,
    transparent 22px),

    radial-gradient(circle at 20% 20%,
    rgba(201,163,75,.08),
    transparent 35%),

    radial-gradient(circle at 80% 80%,
    rgba(201,163,75,.08),
    transparent 35%);

    animation:drift 18s linear infinite;

}

@keyframes drift{

from{
transform:translateY(0);
}

to{
transform:translateY(-40px);
}

}

.wrap{

    position:relative;

    display:flex;

    justify-content:center;
    align-items:center;

    min-height:100vh;

    padding:25px;

}

.card{

    width:min(980px,100%);

    padding:48px;

    border:1px solid rgba(201,163,75,.25);

    background:rgba(255,255,255,.04);

    backdrop-filter:blur(12px);

    border-radius:28px;

    box-shadow:0 0 60px rgba(0,0,0,.5);

}

.logo{

    display:block;

    margin:auto;

    width:220px;

    max-width:100%;

    filter:drop-shadow(0 0 25px rgba(201,163,75,.35));

}

p{

    text-align:center;

    color:#c9a34b;

    letter-spacing:2px;

    margin-top:18px;

}

.btn{

    display:inline-block;

    margin:28px auto 36px;

    padding:15px 34px;

    border:1px solid #c9a34b;

    border-radius:999px;

    color:#fff;

    text-decoration:none;

    transition:.25s;

}

.btn:hover{

    background:rgba(201,163,75,.08);

}

.grid{

    display:grid;

    grid-template-columns:repeat(2,300px);

    gap:18px;

    justify-content:center;

    width:fit-content;

    margin:0 auto;

}

.item{

    padding:18px;

    border-radius:18px;

    background:rgba(255,255,255,.03);

    border:1px solid rgba(201,163,75,.18);

    text-decoration:none;

    color:#fff;

    transition:.25s;

}

.item:hover{

    transform:translateY(-5px);

    border-color:#c9a34b;

    box-shadow:0 0 24px rgba(201,163,75,.2);

}

small{

    display:block;

    color:#aaa;

    margin-top:4px;

}

footer{

    text-align:center;

    margin-top:30px;

    color:#777;

}

/* ========================= */
/* RESPONSIVO */
/* ========================= */

@media (max-width:700px){

    .wrap{

        align-items:flex-start;

        padding:18px;

    }

    .card{

        padding:24px;

        border-radius:20px;

    }

    .logo{

        width:160px;

    }

    p{

        font-size:14px;

        letter-spacing:1px;

        line-height:1.5;

        margin-top:15px;

    }

    .btn{

        display:block;

        width:100%;

        text-align:center;

        margin:24px 0 30px;

    }

    .grid{

        grid-template-columns:1fr;

        width:100%;

        gap:14px;

    }

    .item{

        padding:16px;

    }

    footer{

        margin-top:20px;

        font-size:13px;

    }

}

</style>

</head>

<body>

<div class="wrap">

<div class="card">

<img class="logo" src="logo.png" alt="VN Criações">

<p>IMPRESSÃO 3D • PROTOTIPAGEM • DESIGN</p>

</a>

</div>
